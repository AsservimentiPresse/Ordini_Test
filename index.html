<button onclick="fineOrdine()">✅ Fine Ordine</button>

// 👉 (ho ridotto qui per leggibilità ma funziona già così)
};

// 📦 ORDINE
let ordine = {};

// 📷 SCANNER
function startScanner() {
  const scanner = new Html5QrcodeScanner("reader", { fps: 10 });

  scanner.render((codice) => {
    scanner.clear();

    if (!prodotti[codice]) {
      alert("❌ Prodotto non trovato");
      return;
    }

    let qty = parseInt(prompt("Quantità per " + codice));

    if (!ordine[codice]) ordine[codice] = 0;
    ordine[codice] += qty;

    aggiornaLista();
    navigator.vibrate(200);
  });
}

// 📊 LISTA LIVE
function aggiornaLista() {
  let ul = document.getElementById("lista");
  ul.innerHTML = "";

  for (let cod in ordine) {
    let li = document.createElement("li");
    li.innerText = cod + " → " + ordine[cod];
    ul.appendChild(li);
  }
}

// ✅ FINE ORDINE
function fineOrdine() {

  let dati = [];

  for (let cod in ordine) {
    let p = prodotti[cod];

    dati.push({
      "Descrizione": p.descrizione,
      "Q.ta": ordine[cod],
      "CODICE": cod,
      "CODICE INTERNO": p.codiceInterno,
      "Tipo": p.tipo
    });
  }

  generaExcel(dati);
  inviaWhatsApp(dati);
}

// 📊 EXCEL
function generaExcel(dati) {
  let ws = XLSX.utils.json_to_sheet(dati);
  let wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Ordine");

  XLSX.writeFile(wb, "ordine_" + new Date().toISOString() + ".xlsx");
}

// 📤 WHATSAPP
function inviaWhatsApp(dati) {
  let testo = dati.map(d => `${d.CODICE} - ${d["Q.ta"]}`).join("%0A");
  window.open(`https://wa.me/?text=${testo}`);
}

</script>

</body>
</html>
