<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ordini Magazzino</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; text-align: center; background:#f2f2f2;}
button { font-size: 22px; padding: 15px; margin: 10px; width: 90%; border-radius:10px;}
#reader { width: 300px; margin: auto; }
li { font-size:18px; margin:5px; }
</style>
</head>

<body>

<h2>📦 Ordini Magazzino</h2>

<button onclick="startScanner()">📷 Scansiona QR</button>
<button onclick="fineOrdine()">✅ Fine Ordine</button>

<div id="reader"></div>

<h3>Lista ordine</h3>
<ul id="lista"></ul>

<script>

// 📦 DATABASE
let prodotti = {
"CA12PD0M": { descrizione:"Cavo finecorsa 12m", codiceInterno:"6275", tipo:"C"},
"NS E4TE1SMK-F41": { descrizione:"Finecorsa sicurezza", codiceInterno:"6274", tipo:"C"},
"060PMG": { descrizione:"Pulsantiera mobile", codiceInterno:"8189", tipo:"T"}
};

// 📦 ORDINE
let ordine = {};

// 📷 SCANNER
function startScanner() {
  const scanner = new Html5QrcodeScanner("reader", { fps: 10 });

  scanner.render((raw) => {

    scanner.clear();

    let codice = raw.replace(/\n/g, "").trim();

    console.log("QR letto:", codice);

    if (!prodotti[codice]) {
      alert("❌ Codice non trovato:\n" + codice);
      return;
    }

    let qty = parseInt(prompt("Quantità per " + codice));

    if (!qty || qty <= 0) return;

    if (!ordine[codice]) ordine[codice] = 0;
    ordine[codice] += qty;

    aggiornaLista();
    navigator.vibrate(200);
  });
}

// 📊 LISTA
function aggiornaLista() {
  let ul = document.getElementById("lista");
  ul.innerHTML = "";

  for (let cod in ordine) {
    let li = document.createElement("li");
    li.innerText = cod + " → " + ordine[cod];
    ul.appendChild(li);
  }
}

// ✅ FINE ORDINE
function fineOrdine() {

  if (Object.keys(ordine).length === 0) {
    alert("Nessun prodotto inserito");
    return;
  }

  let dati = [];

  for (let cod in ordine) {
    let p = prodotti[cod];

    dati.push({
      "Descrizione": p.descrizione,
      "Q.ta": ordine[cod],
      "CODICE": cod,
      "CODICE INTERNO": p.codiceInterno,
      "Tipo": p.tipo
    });
  }

  generaExcel(dati);

  setTimeout(() => {
    if (confirm("Vuoi inviare anche su WhatsApp?")) {
      inviaWhatsApp(dati);
    }
  }, 500);
}

// 📊 EXCEL
function generaExcel(dati) {
  let ws = XLSX.utils.json_to_sheet(dati);
  let wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Ordine");

  let nome = "ordine_" + new Date().toISOString().replace(/[:.]/g,"-") + ".xlsx";

  XLSX.writeFile(wb, nome);
}

// 📤 WHATSAPP
function inviaWhatsApp(dati) {

  let testo = "Ordine:\n\n";

  dati.forEach(d => {
    testo += d.CODICE + " - Q.ta: " + d["Q.ta"] + "\n";
  });

  let url = "https://wa.me/?text=" + encodeURIComponent(testo);

  window.open(url);
}

</script>

</body>
</html>
