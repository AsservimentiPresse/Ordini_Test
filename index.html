<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Ordini Magazzino PRO</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background:#111;
  color:white;
  margin:0;
}

h2 { font-size:32px; }

/* BOTTONI */
button {
  font-size: 26px;
  padding: 20px;
  margin: 8px;
  width: 95%;
  border-radius:15px;
  border:none;
  background:#007bff;
  color:white;
}

.stop-btn { background:#dc3545; }

/* SCANNER FULL */
#reader {
  width: 100%;
  height: 60vh;
}

/* LISTA */
li {
  font-size:24px;
  margin:10px;
  background:#222;
  padding:15px;
  border-radius:12px;
  list-style:none;
}

/* INDICATORE SCAN */
#status {
  font-size:22px;
  padding:10px;
  background:#28a745;
}
</style>

</head>

<body>

<h2>⚡ Ordini Magazzino PRO</h2>

<div id="status">📷 Camera pronta</div>

<button onclick="startCamera()">▶️ Avvia</button> <button class="stop-btn" onclick="stopCamera()">⛔ Stop</button> <button onclick="resetOrdine()">🗑️ Reset</button> <button onclick="fineOrdine()">✅ Fine Ordine</button>

<div id="reader"></div>

<ul id="lista"></ul>

<script>

// 📦 DATABASE
let prodotti = {
"NS E4TE1SMK-F41": { descrizione:"Finecorsa sicurezza"},
"CA12PD0M": { descrizione:"Cavo 12m"}
};

// 📦 ORDINE
let ordine = JSON.parse(localStorage.getItem("ordine")) || {};
aggiornaLista();

let scanner;
let lastScan = "";
let scanningLock = false;

// 📷 START
function startCamera() {

  if (scanner) return;

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 15, qrbox: { width: 300, height: 300 } },

    (codice) => {

      if (scanningLock) return;

      let codicePulito = codice.trim().toUpperCase();

      if (!prodotti[codicePulito]) {
        document.getElementById("status").innerText = "❌ NON TROVATO";
        return;
      }

      // 🔒 BLOCCO ANTI DOPPIO
      scanningLock = true;

      ordine[codicePulito] = (ordine[codicePulito] || 0) + 1;

      salvaOrdine();
      aggiornaLista();

      document.getElementById("status").innerText =
        "✅ " + codicePulito + " +1";

      if (navigator.vibrate) navigator.vibrate(100);
      new Audio("https://www.soundjay.com/buttons/beep-07.wav").play();

      // 🔁 SBLOCCO DOPO 1s
      setTimeout(() => {
        scanningLock = false;
        document.getElementById("status").innerText = "📷 Pronto...";
      }, 1000);
    }
  );
}

// ⛔ STOP
function stopCamera() {
  if (scanner) {
    scanner.stop().then(() => {
      scanner.clear();
      scanner = null;
    });
  }
}

// 📊 LISTA
function aggiornaLista() {
  let ul = document.getElementById("lista");
  ul.innerHTML = "";

  for (let cod in ordine) {
    let li = document.createElement("li");
    li.innerText = cod + " → " + ordine[cod];
    ul.appendChild(li);
  }
}

// 🗑️ RESET
function resetOrdine() {
  if (!confirm("Reset ordine?")) return;
  ordine = {};
  salvaOrdine();
  aggiornaLista();
}

// 💾 SALVA
function salvaOrdine() {
  localStorage.setItem("ordine", JSON.stringify(ordine));
}

// ✅ FINE
function fineOrdine() {

  if (Object.keys(ordine).length === 0) {
    alert("Ordine vuoto!");
    return;
  }

  let dati = [];

  for (let cod in ordine) {
    dati.push({
      "CODICE": cod,
      "Q.ta": ordine[cod]
    });
  }

  if (confirm("Excel?")) generaExcel(dati);
  if (confirm("WhatsApp?")) inviaWhatsApp(dati);
}

// 📊 EXCEL
function generaExcel(dati) {
  let ws = XLSX.utils.json_to_sheet(dati);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Ordine");
  XLSX.writeFile(wb, "ordine.xlsx");
}

// 📤 WHATSAPP
function inviaWhatsApp(dati) {
  let testo = dati.map(d =>
    `${d.CODICE} - ${d["Q.ta"]}`
  ).join("%0A");

  window.open(`https://wa.me/?text=${testo}`);
}

// 🔘 TASTI VOLUME = SCAN (alcuni Android)
document.addEventListener("keydown", (e) => {
  if (e.key === "VolumeUp" || e.key === "VolumeDown") {
    scanningLock = false;
  }
});

</script>

</body>
</html>
