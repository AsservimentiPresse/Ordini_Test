<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Ordini Magazzino</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background:#f5f5f5;
  margin:0;
}

h2 { font-size:28px; }

button {
  font-size: 22px;
  padding: 18px;
  margin: 8px;
  width: 95%;
  border-radius:12px;
  border:none;
  background:#007bff;
  color:white;
}

button:active {
  transform: scale(0.97);
}

#reader {
  width: 95%;
  max-width: 500px;
  margin: 15px auto;
}

ul {
  padding:0;
}

li {
  font-size:20px;
  margin:8px;
  background:white;
  padding:10px;
  border-radius:10px;
  list-style:none;
}

.small-btn {
  font-size:16px;
  padding:6px 10px;
  margin-left:10px;
  background:red;
}
</style>

</head>

<body>

<h2>📦 Ordini Magazzino</h2>

<button onclick="startScanner()">📷 Avvia Scanner</button> <button onclick="stopScanner()">⛔ Ferma Scanner</button> <button onclick="resetOrdine()">🗑️ Reset Ordine</button> <button onclick="fineOrdine()">✅ Fine Ordine</button>

<div id="reader"></div>

<h3>Lista ordine</h3>
<ul id="lista"></ul>

<script>

// 📦 DATABASE
let prodotti = {
"NS E4TE1SMK-F41": { descrizione:"Finecorsa sicurezza PIZZATO", codiceInterno:"6274", tipo:"C"},
"CA12PD0M": { descrizione:"Cavo finecorsa 12m", codiceInterno:"6275", tipo:"C"},
"060PMG": { descrizione:"Pulsantiera mobile", codiceInterno:"8189", tipo:"T"},
"016P3P22": { descrizione:"Pulsante 3 posizioni", codiceInterno:"8190", tipo:"T"}
};

// 📦 ORDINE
let ordine = JSON.parse(localStorage.getItem("ordine")) || {};
aggiornaLista();

// 📷 SCANNER
let scanner;

function startScanner() {

  if (scanner) return;

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 300, height: 300 } },

    (codice) => {

      let codicePulito = codice.trim().toUpperCase();

      if (!prodotti[codicePulito]) {
        alert("❌ Prodotto non trovato: " + codicePulito);
        return;
      }

      let qty = parseInt(prompt("Quantità per " + codicePulito));

      if (isNaN(qty) || qty <= 0) {
        alert("Quantità non valida");
        return;
      }

      ordine[codicePulito] = (ordine[codicePulito] || 0) + qty;

      salvaOrdine();
      aggiornaLista();

      if (navigator.vibrate) navigator.vibrate(200);
      new Audio("https://www.soundjay.com/buttons/beep-07.wav").play();
    }
  );
}

function stopScanner() {
  if (scanner) {
    scanner.stop().then(() => {
      scanner.clear();
      scanner = null;
    });
  }
}

// 📊 LISTA
function aggiornaLista() {
  let ul = document.getElementById("lista");
  ul.innerHTML = "";

  for (let cod in ordine) {

    let li = document.createElement("li");

    li.innerHTML = `
      <b>${cod}</b> → ${ordine[cod]}
      <button class="small-btn" onclick="rimuovi('${cod}')">❌</button>
    `;

    ul.appendChild(li);
  }
}

// ❌ RIMUOVI
function rimuovi(cod) {
  delete ordine[cod];
  salvaOrdine();
  aggiornaLista();
}

// 🗑️ RESET
function resetOrdine() {
  if (!confirm("Vuoi cancellare tutto l'ordine?")) return;
  ordine = {};
  salvaOrdine();
  aggiornaLista();
}

// 💾 SALVA
function salvaOrdine() {
  localStorage.setItem("ordine", JSON.stringify(ordine));
}

// ✅ FINE ORDINE
function fineOrdine() {

  if (Object.keys(ordine).length === 0) {
    alert("Ordine vuoto!");
    return;
  }

  let dati = [];

  for (let cod in ordine) {
    let p = prodotti[cod];

    dati.push({
      "Descrizione": p.descrizione,
      "Q.ta": ordine[cod],
      "CODICE": cod,
      "CODICE INTERNO": p.codiceInterno,
      "Tipo": p.tipo
    });
  }

  if (confirm("Vuoi salvare l'Excel?")) {
    generaExcel(dati);
  }

  if (confirm("Vuoi inviare su WhatsApp?")) {
    inviaWhatsApp(dati);
  }
}

// 📊 EXCEL
function generaExcel(dati) {

  let ws = XLSX.utils.json_to_sheet(dati);
  let wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Ordine");

  XLSX.writeFile(wb, "ordine_" + new Date().toISOString() + ".xlsx");
}

// 📤 WHATSAPP
function inviaWhatsApp(dati) {

  let testo = dati.map(d =>
    `${d.Descrizione}\nCod: ${d.CODICE}\nQta: ${d["Q.ta"]}\n`
  ).join("%0A");

  window.open(`https://wa.me/?text=${testo}`);
}

</script>

</body>
</html>
